<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新しい写真を登録</title>
    <!-- <title>観光名所を登録</title> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- style追加 -->
    <style>
        body { background: #f5f5f5; }
        .header {
          background: #7b3f00;
          color: white;
          padding: 10px 20px;
          display: flex;
          justify-content: space-between;
        }
        .form-box {
          background: white;
          padding: 20px;
        margin: 30px auto;
         max-width: 400px;
        }
        .btn-custom {
            background: #00a8c6;
            color: white;
            width: 100%;
        }
    </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <h5>三都フォト歩き</h5>
  <a href="{{ url_for('index') }}" class="text-white">HOME</a>
</div>    

<!-- フォーム -->
<div class="form-box">
  <h5 class="mt-4 text-muted">新しい写真を登録</h5>
    <!-- <h1>観光名所を登録</h1> -->
    <!-- <a href="{{ url_for('index') }}">一覧に戻る</a> -->

    <form class="mt-3" action="{{ url_for('add') }}" method="POST" enctype="multipart/form-data">
        <div class="mb-3">  
            <label class="fw-semibold">タイトル（10字以内がおすすめ）</label>
            <input type="text" class="form-control" name="name" required>
            <!-- <label>名前</label><br> -->   
            <!-- <input type="text" name="name" required> -->
        </div>
        <div class="mb-3">
            <label class="fw-semibold">説明（20字以内がおすすめ）</label>
            <input type="text" class="form-control" name="description">
            <!-- <label>説明</label><br> -->
            <!-- <textarea name="description"></textarea> -->
        </div>
        <div class="mb-3">
            <label class="fw-semibold">カテゴリ</label>
            <select class="form-control" name="category" required>
                <option value="">選択してください</option>
                <option value="今治">今治</option>
                <option value="寝屋川">寝屋川</option>
                <option value="富山">富山</option>
            </select>
            <!-- <input type="text" class="form-control" name="category"> -->
        </div>
        <div>
            <label class="fw-semibold">写真</label><br>
            <input type="file" class="form-control" name="image" required>
        </div>
      
        <button type="submit" class="btn btn-custom mt-4">登録</button>
    </form>
</div>

</body>
</html>
